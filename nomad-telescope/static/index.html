<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomad Trading Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <header class="header">
            <div>
                <h1>NOMAD <span>TERMINAL</span></h1>
                <p>Asian Mean Reversion Engine</p>
            </div>
            <div class="status-indicator">
                <div class="dot" id="status-dot"></div>
                <span id="status-text">Connecting...</span>
            </div>
        </header>

        <div class="metrics-grid">
            <div class="metric-card">
                <h3>Account Balance</h3>
                <h2 id="balance-value">$0.00</h2>
            </div>
            <div class="metric-card">
                <h3>Live Equity</h3>
                <h2 id="equity-value" class="neon-blue">$0.00</h2>
            </div>
            <div class="metric-card">
                <h3>Pairs Tracking</h3>
                <h2 id="tracking-value">0</h2>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <h2>Live Positions</h2>
                <div class="pulse-ring"></div>
            </div>
            <div class="table-container">
                <table id="trades-table">
                    <thead>
                        <tr>
                            <th>Ticket</th>
                            <th>Symbol</th>
                            <th>Type</th>
                            <th>Volume</th>
                            <th>Open Price</th>
                            <th>Current Price</th>
                            <th>Profit</th>
                        </tr>
                    </thead>
                    <tbody id="trades-body">
                        <tr><td colspan="7" class="empty-state">No open positions</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
